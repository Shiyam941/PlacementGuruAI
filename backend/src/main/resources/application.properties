# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080
spring.application.name=PlacementGuruAI


# ===============================
# MONGODB ATLAS CONFIGURATION
# ===============================
spring.data.mongodb.uri=your mongo db url
spring.data.mongodb.database=placementguru

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret= your jwt key
jwt.expiration=86400000


# ===============================
# FILE UPLOAD CONFIGURATION
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# ===============================
# LOCAL AI CONFIGURATION (OLLAMA)
# ===============================
# Using Ollama with Gemma3 model locally
# No API key needed for local models
ai.api.key=not-needed
ai.api.url=http://localhost:11434/v1
ai.model=gemma3:4b


# ===============================
# CORS CONFIGURATION
# ===============================
app.cors.allowed-origins=http://localhost:3001


# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.com.placementguru=DEBUG
